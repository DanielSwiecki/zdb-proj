services:
  postgres:
    container_name: 'zbd_postgres'
    image: 'postgres:17'
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: zdb
    ports:
      - "12345:5432"
    volumes:
      - postgres_data_zdb:/var/lib/postgresql/data

volumes:
  postgres_data_zdb: